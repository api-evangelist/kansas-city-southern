aid: kansas-city-southern
name: Kansas City Southern
description: >-
  Kansas City Southern (KCS) was a transportation holding company that
  operated freight rail networks across the United States and Mexico. On
  April 14, 2023, KCS merged with Canadian Pacific Railway to form Canadian
  Pacific Kansas City (CPKC), the first single-line rail network connecting
  Canada, the United States, and Mexico. CPKC operates approximately 32,000
  km (20,000 mi) of rail and is headquartered in Calgary, Alberta, with U.S.
  headquarters in Kansas City, Missouri.
